# Local stack: MLflow tracking server + the churn API.
# Bring everything up with a single command:
#
#   docker compose up --build
#
# Then:
#   - http://localhost:5000   → MLflow UI
#   - http://localhost:8000/health
#   - http://localhost:8000/predict       (POST a CustomerFeatures payload)
#
# The API's MLFLOW_TRACKING_URI is wired to the mlflow service. Train inside
# the api container with:
#
#   docker compose run --rm api python -m churn.training.train

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: churn-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlruns:/mlflow/mlruns
      - mlflow-db:/mlflow/db
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/db/mlflow.db
      --default-artifact-root file:///mlflow/mlruns
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    build: .
    container_name: churn-api
    depends_on:
      mlflow:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: churn
      MODEL_NAME: churn_classifier
      MODEL_STAGE: Production
      DATA_DIR: /app/data
      LOG_FORMAT: json
    volumes:
      # Data on a read-only mount: the API only reads the baseline CSV for
      # the /drift-report endpoint. Model artifacts come from MLflow, never
      # from this volume.
      - ./data:/app/data:ro

volumes:
  mlruns:
  mlflow-db:
