name: Scheduled training

on:
  workflow_dispatch:
    inputs:
      register:
        description: "Register trained models in MLflow Registry"
        required: false
        default: "false"
        type: boolean
  # First of every month, 06:00 UTC. Adjust as needed.
  schedule:
    - cron: "0 6 1 * *"

jobs:
  train:
    name: train all three models
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install package + deps (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.7.1 --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e .

      - name: Download dataset (verifies MD5)
        run: python -m churn.data.download

      - name: Train all models
        # ``--no-register`` because this workflow runs against a local SQLite
        # tracking store; registration here would not propagate to a real
        # MLflow server. Promoting an artifact to Production is a deliberate
        # human action via ``make promote VERSION=N``.
        run: python -m churn.training.train --no-register

      - name: Upload mlruns artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-${{ github.run_number }}
          path: mlruns/
          retention-days: 30

      - name: Upload trained-model summary
        if: always()
        run: |
          echo "### Training run ${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Triggered by: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
