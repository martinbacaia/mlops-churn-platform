name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref so a quick second push doesn't
# block the queue with stale work.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + types + tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install package + dev deps (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.7.1 --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e .
          python -m pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        run: python -m ruff check src tests scripts

      - name: Format check (ruff format)
        run: python -m ruff format --check src tests scripts

      - name: Type check (mypy --strict)
        run: python -m mypy

      - name: Run tests with coverage
        run: python -m pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
